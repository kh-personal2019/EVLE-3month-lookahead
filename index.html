const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
const weekdayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const defaultColors={'SnoCo':'#2563eb','Lynnwood':'#7c3aed','Everett':'#0891b2','Station Area Planning':'#16a34a','Corridor Design':'#f59e0b','IDT':'#dc2626','Third-Party Prep':'#0f766e','SnoPUD':'#ea580c','WSDOT':'#475569','Permitting Working Group':'#be185d','IAG':'#9333ea','CT/ET':'#0284c7','PSE':'#64748b','Holiday':'#111827','Milestone':'#a16207','Other':'#64748b'};
let events=DATA.slice(), months=[], index=0, view=3, active=new Set(), colors=JSON.parse(localStorage.getItem('evleColors')||'{}'), search='', selected=null;
const $=s=>document.querySelector(s);
function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
function ym(d){return String(d||'').slice(0,7)} function mtitle(v){let [y,m]=v.split('-').map(Number);return monthNames[m-1]+' '+y} function color(c){return colors[c]||defaultColors[c]||'#334155'}
function refreshMonths(){months=[...new Set(events.map(e=>ym(e.date)).filter(Boolean))].sort(); if(!months.length) months=['2026-07']; if(index>=months.length) index=months.length-1;}
function buildSelect(){let old=$('#monthSelect').value; $('#monthSelect').innerHTML=months.map(m=>`<option value="${m}">${mtitle(m)}</option>`).join(''); if(old&&months.includes(old)){index=months.indexOf(old)} $('#monthSelect').value=months[index];}
function filtered(){let t=search.trim().toLowerCase(); return events.filter(e=>active.has(e.category||'Other') && (!t || `${e.date} ${e.title} ${e.category} ${e.status} ${e.details}`.toLowerCase().includes(t)));}
function addMonths(y,m,a){let d=new Date(y,m+a,1); return [d.getFullYear(),d.getMonth()]}
function days(y,m){let start=new Date(y,m,1).getDay(), last=new Date(y,m+1,0).getDate(), prev=new Date(y,m,0).getDate(), arr=[]; for(let i=start-1;i>=0;i--)arr.push({n:prev-i,out:true}); for(let d=1;d<=last;d++)arr.push({n:d,out:false,iso:`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}); let n=1; while(arr.length%7)arr.push({n:n++,out:true}); return arr;}
function render(){refreshMonths();buildSelect();renderCalendars();renderCats();renderAgenda();renderStats();}
function renderCalendars(){let list=filtered(), wrap=$('#calendars'); wrap.className=view===3?'three':'one'; wrap.innerHTML=''; let [by,bm]=months[index].split('-').map(Number), titles=[]; for(let i=0;i<(view===3?3:1);i++){let [y,m]=addMonths(by,bm-1,i), cur=`${y}-${String(m+1).padStart(2,'0')}`; titles.push(mtitle(cur)); let evs=list.filter(e=>ym(e.date)===cur), byDate={}; evs.forEach(e=>(byDate[e.date] ||= []).push(e)); let card=document.createElement('section'); card.className='month'; card.innerHTML=`<div class="month-head"><h2>${mtitle(cur)}</h2><div class="month-count">${evs.length} events</div></div><div class="weekdays">${weekdayNames.map(d=>`<div>${d}</div>`).join('')}</div><div class="grid"></div>`; let grid=card.querySelector('.grid'); days(y,m).forEach(day=>{let cell=document.createElement('div'); cell.className='day'+(day.out?' out':''); cell.innerHTML=`<div class="num">${day.n}</div>`; if(day.iso&&byDate[day.iso]){let groups={}; byDate[day.iso].sort((a,b)=>(a.category||'').localeCompare(b.category||'')||(a.title||'').localeCompare(b.title||'')).forEach(e=>(groups[e.category||'Other'] ||= []).push(e)); Object.entries(groups).forEach(([cat,items])=>{let g=document.createElement('div'); g.className='group'; g.style.borderLeftColor=color(cat); g.innerHTML=`<div class="group-title">${esc(cat)}${items.length>1?' ('+items.length+')':''}</div><div class="group-meta">${items.length>1?'Grouped by category':'1 item'}</div>`; items.forEach(ev=>{let b=document.createElement('button'); b.className='event '+String(ev.status||'').toLowerCase(); b.textContent=ev.title||'(Untitled)'; b.onclick=()=>openDialog(ev.id); g.appendChild(b);}); cell.appendChild(g);});} grid.appendChild(cell);}); wrap.appendChild(card);} $('#title').textContent=view===3?titles[0]+' - '+titles[titles.length-1]:titles[0];}
function renderCats(){let box=$('#cats'); box.innerHTML=''; [...new Set(events.map(e=>e.category||'Other'))].sort().forEach(cat=>{let r=document.createElement('label'); r.className='cat-row'; r.innerHTML=`<input type="checkbox" ${active.has(cat)?'checked':''}><span>${esc(cat)}</span><input type="color" value="${color(cat)}">`; let [chk,pick]=r.querySelectorAll('input'); chk.onchange=()=>{chk.checked?active.add(cat):active.delete(cat);render()}; pick.oninput=()=>{colors[cat]=pick.value;localStorage.setItem('evleColors',JSON.stringify(colors));render()}; box.appendChild(r);});}
function renderAgenda(){let a=$('#agenda'); a.innerHTML=''; filtered().sort((x,y)=>x.date.localeCompare(y.date)||x.category.localeCompare(y.category)).forEach(e=>{let b=document.createElement('button'); b.style.borderLeftColor=color(e.category); b.innerHTML=`<div class="agenda-date">${esc(e.date)} · ${esc(e.category)} · ${esc(e.status)}</div><div class="agenda-title">${esc(e.title)}</div>`; b.onclick=()=>openDialog(e.id); a.appendChild(b);});}
function renderStats(){let list=filtered(); $('#visibleCount').textContent=list.length; $('#categoryCount').textContent=new Set(list.map(e=>e.category)).size; $('#tentativeCount').textContent=list.filter(e=>String(e.status).toLowerCase()==='tentative').length;}
function openDialog(id){let e=events.find(x=>x.id===id); if(!e)return; selected=id; $('#badge').textContent=e.category; $('#badge').style.background=color(e.category); $('#dialogTitle').textContent=e.title; $('#dialogDate').textContent=e.date+' · '+e.status; let detail=String(e.details||'').split(/\n+/).filter(Boolean); $('#dialogBody').innerHTML=detail.length?'<ul class="detail-list">'+detail.map(d=>'<li>'+esc(d)+'</li>').join('')+'</ul>':'<p>No details listed.</p>'; $('#dialog').showModal();}
function fillForm(id){let e=events.find(x=>x.id===id); if(!e)return; $('#eventId').value=e.id; $('#eventDate').value=e.date; $('#eventTitle').value=e.title; $('#eventCategory').value=e.category; $('#eventStatus').value=e.status; $('#eventDetails').value=e.details; $('#dialog').close(); $('#editor').classList.remove('hidden'); $('#showEditor').classList.add('hidden');}
function clearForm(){$('#eventForm').reset(); $('#eventId').value='';}
function saveEvent(ev){ev.preventDefault(); let id=$('#eventId').value||$('#eventDate').value+'-'+Date.now(); let month=$('#eventDate').value?monthNames[new Date($('#eventDate').value+'T00:00:00').getMonth()]:''; let row={id,date:$('#eventDate').value,title:$('#eventTitle').value,category:$('#eventCategory').value,status:$('#eventStatus').value,details:$('#eventDetails').value,sourceMonth:month}; let i=events.findIndex(x=>x.id===id); if(i>=0)events[i]=row; else events.push(row); active.add(row.category); clearForm(); render();}
function download(name,text,type){let blob=new Blob([text],{type}), a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),500)}
function toCSV(rows){let h=['id','date','title','category','status','details','sourceMonth'];let escCSV=v=>{v=String(v??'');if(v.includes('"')||v.includes(',')||v.includes('\\n')||v.includes('\\n')){return '"'+v.replace(/"/g,'""')+'"'}return v};return h.join(',')+'\\n'+rows.map(r=>h.map(k=>escCSV(r[k])).join(',')).join('\\n')}
$('#monthSelect').onchange=e=>{index=months.indexOf(e.target.value);render()}; $('#prevBtn').onclick=()=>{if(index>0){index--;render()}}; $('#nextBtn').onclick=()=>{if(index<months.length-1){index++;render()}}; $('#oneBtn').onclick=()=>{view=1;$('#oneBtn').classList.add('active');$('#threeBtn').classList.remove('active');render()}; $('#threeBtn').onclick=()=>{view=3;$('#threeBtn').classList.add('active');$('#oneBtn').classList.remove('active');render()}; $('#search').oninput=e=>{search=e.target.value;render()}; $('#printBtn').onclick=()=>window.print(); $('#jsonBtn').onclick=()=>download('events-all.json',JSON.stringify(events,null,2),'application/json'); $('#csvBtn').onclick=()=>download('events-all.csv',toCSV(events),'text/csv'); $('#eventForm').onsubmit=saveEvent; $('#clearBtn').onclick=clearForm; $('#deleteBtn').onclick=()=>{let id=$('#eventId').value;if(id){events=events.filter(e=>e.id!==id);clearForm();render()}}; $('#closeDialog').onclick=()=>$('#dialog').close(); $('#editDialog').onclick=()=>fillForm(selected); $('#hideEditor').onclick=()=>{$('#editor').classList.add('hidden');$('#showEditor').classList.remove('hidden')}; $('#showEditor').onclick=()=>{$('#editor').classList.remove('hidden');$('#showEditor').classList.add('hidden')};
active=new Set(events.map(e=>e.category||'Other')); refreshMonths(); render();
