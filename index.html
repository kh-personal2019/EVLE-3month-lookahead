<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVLE Phase II Lookahead Calendar</title>

    <link rel="stylesheet" href="styles.css">

    <style>
        .calendar-controls{
            display:flex;
            flex-wrap:wrap;
            gap:10px;
            align-items:center;
            padding:16px;
            background:#fff;
            border-bottom:1px solid #ddd;
        }

        .calendar-controls button,
        .calendar-controls select{
            padding:10px 14px;
            border-radius:8px;
            border:1px solid #ccc;
            cursor:pointer;
        }

        .view-toggle.active{
            background:#2563eb;
            color:#fff;
            border-color:#2563eb;
        }

        #calendarContainer{
            display:grid;
            gap:20px;
            padding:20px;
        }

        .one-month{
            grid-template-columns:1fr;
        }

        .three-month{
            grid-template-columns:repeat(3,minmax(350px,1fr));
        }

        @media (max-width:1200px){
            .three-month{
                grid-template-columns:1fr;
            }
        }
    </style>

</head>
<body>

<header class="site-header">
    <div>
        <div class="eyebrow">
            EVLE Phase II
        </div>

        <h1 id="headerTitle">
            Lookahead Calendar
        </h1>
    </div>

    <div class="header-meta">
        July - December 2026
    </div>
</header>

<section class="calendar-controls">

    <button id="prevMonth">
        ◀ Previous
    </button>

    <select id="monthSelector">
        <option value="2026-07">July 2026</option>
        <option value="2026-08">August 2026</option>
        <option value="2026-09">September 2026</option>
        <option value="2026-10">October 2026</option>
        <option value="2026-11">November 2026</option>
        <option value="2026-12">December 2026</option>
    </select>

    <button id="nextMonth">
        Next ▶
    </button>

    <button id="oneMonthView"
            class="view-toggle">
        1 Month View
    </button>

    <button id="threeMonthView"
            class="view-toggle active">
        3 Month Lookahead
    </button>

</section>

<div id="calendarContainer"
     class="three-month">

</div>

<script>

let currentMonthIndex = 0;

const months = [
    "2026-07",
    "2026-08",
    "2026-09",
    "2026-10",
    "2026-11",
    "2026-12"
];
